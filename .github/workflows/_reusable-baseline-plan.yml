name: _reusable-baseline-plan

# PR plan 用リユーザブルワークフロー（terraform-accounts 専用）
# terraform-repo の _reusable-terraform-plan.yml と同等の機能を持つ

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      working_directory:
        type: string
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Select IAM role
        id: role
        run: |
          case "$ENVIRONMENT" in
            dev)  echo "arn=${{ secrets.AWS_ACCOUNTS_PLAN_ROLE_ARN_DEV }}"  >> "$GITHUB_OUTPUT" ;;
            stg)  echo "arn=${{ secrets.AWS_ACCOUNTS_PLAN_ROLE_ARN_STG }}"  >> "$GITHUB_OUTPUT" ;;
            prod) echo "arn=${{ secrets.AWS_ACCOUNTS_PLAN_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "Unsupported environment: $ENVIRONMENT"; exit 1 ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false

      - name: Install checkov
        run: python3 -m pip install --quiet checkov

      - name: Install tfcmt
        run: |
          set -euxo pipefail
          TFCMT_VERSION="v4.14.15"
          curl --fail --location --show-error -o /tmp/tfcmt.tar.gz \
            "https://github.com/suzuki-shunsuke/tfcmt/releases/download/${TFCMT_VERSION}/tfcmt_linux_amd64.tar.gz"
          tar xzf /tmp/tfcmt.tar.gz tfcmt
          sudo mv tfcmt /usr/local/bin/tfcmt
          tfcmt --version

      - name: Install conftest
        run: |
          set -euxo pipefail
          CONFTEST_VERSION="0.68.2"
          curl --fail --location --show-error -o /tmp/conftest.tar.gz \
            "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf /tmp/conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest
          conftest --version

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.70.0
          cache: true

      - name: Run Trivy config scan
        id: trivy
        run: |
          set +e
          trivy config \
            --ignorefile "$GITHUB_WORKSPACE/.trivyignore.yaml" \
            --format table \
            --exit-code 1 \
            --output /tmp/trivy-output.txt \
            ${{ inputs.working_directory }}
          TRIVY_EXIT_CODE=$?

          if [ "$TRIVY_EXIT_CODE" -eq 0 ]; then
            echo "### Trivy — $ENVIRONMENT ✅" >> "$GITHUB_STEP_SUMMARY"
            echo "問題は検出されませんでした。" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Trivy — $ENVIRONMENT ❌" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/trivy-output.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          cat /tmp/trivy-output.txt || true
          exit "$TRIVY_EXIT_CODE"

      - name: Run Checkov
        id: checkov
        if: always()
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -o pipefail
          checkov -d . --quiet --framework terraform \
            --config-file "$GITHUB_WORKSPACE/.checkov.yml" \
            2>&1 | tee /tmp/checkov-output.txt

      - name: Show Checkov results in Step Summary
        if: always()
        run: |
          if [ "${{ steps.checkov.outcome }}" = "success" ]; then
            echo "### Checkov — $ENVIRONMENT ✅" >> "$GITHUB_STEP_SUMMARY"
            echo "問題は検出されませんでした。" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Checkov — $ENVIRONMENT ❌" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/checkov-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "checkov did not run or did not generate an output file." >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tfcmt --var "env:$ENVIRONMENT" plan -- terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Run conftest security checks
        if: steps.plan.outcome == 'success'
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform show -json tfplan > tfplan.json
          conftest test tfplan.json -p "$GITHUB_WORKSPACE/policy"

      - name: Show plan in Step Summary
        if: steps.plan.outcome == 'success'
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "### Baseline Plan — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
