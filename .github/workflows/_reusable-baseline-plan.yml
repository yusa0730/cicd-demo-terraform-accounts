name: _reusable-baseline-plan

# PR plan 用リユーザブルワークフロー（terraform-accounts 専用）
# terraform-repo の _reusable-terraform-plan.yml と同等の機能を持つ

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      working_directory:
        type: string
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Select IAM role
        id: role
        run: |
          case "$ENVIRONMENT" in
            dev)  echo "arn=${{ secrets.AWS_ACCOUNTS_PLAN_ROLE_ARN_DEV }}"  >> "$GITHUB_OUTPUT" ;;
            stg)  echo "arn=${{ secrets.AWS_ACCOUNTS_PLAN_ROLE_ARN_STG }}"  >> "$GITHUB_OUTPUT" ;;
            prod) echo "arn=${{ secrets.AWS_ACCOUNTS_PLAN_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "Unsupported environment: $ENVIRONMENT"; exit 1 ;;
          esac

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.role.outputs.arn }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"
          terraform_wrapper: false

      - name: Install tools (checkov / tfcmt / conftest)
        run: |
          # checkov
          pip install --quiet checkov

          # tfcmt（ファイルに保存してから展開）
          curl --fail -sL -o /tmp/tfcmt.tar.gz \
            https://github.com/suzuki-shunsuke/tfcmt/releases/download/v4.13.0/tfcmt_linux_amd64.tar.gz
          tar xzf /tmp/tfcmt.tar.gz tfcmt
          sudo mv tfcmt /usr/local/bin/tfcmt

          # conftest（ファイルに保存してから展開）
          curl --fail -sL -o /tmp/conftest.tar.gz \
            https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_Linux_x86_64.tar.gz
          tar xzf /tmp/conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest

      - name: Run trivy
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: config
          scan-ref: ${{ inputs.working_directory }}
          exit-code: "1"
          format: table
          output: /tmp/trivy-output.txt

      - name: Show trivy results in Step Summary
        if: always()
        run: |
          if [ "${{ steps.trivy.outcome }}" = "success" ]; then
            echo "### trivy — $ENVIRONMENT ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### trivy — $ENVIRONMENT ⚠️" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if [ -f /tmp/trivy-output.txt ]; then
              cat /tmp/trivy-output.txt >> "$GITHUB_STEP_SUMMARY"
            else
              echo "trivy did not generate an output file." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run checkov
        id: checkov
        working-directory: ${{ inputs.working_directory }}
        continue-on-error: true
        run: checkov -d . --quiet --framework terraform 2>&1 | tee /tmp/checkov-output.txt

      - name: Show checkov results in Step Summary
        if: always()
        run: |
          if [ "${{ steps.checkov.outcome }}" = "success" ]; then
            echo "### checkov — $ENVIRONMENT ✅" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### checkov — $ENVIRONMENT ⚠️" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/checkov-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: tfcmt --var "env:$ENVIRONMENT" plan -- terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Run conftest security checks
        if: steps.plan.outcome == 'success'
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform show -json tfplan > tfplan.json
          conftest test tfplan.json -p "$GITHUB_WORKSPACE/policy"

      - name: Show plan in Step Summary
        if: steps.plan.outcome == 'success'
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "### Baseline Plan — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
