ci: github-actions

notifier:
  github:
    token: $GITHUB_TOKEN

terraform:
  plan:
    template: |
      ## Terraform Plan — `{{ .Vars.env }}`

      {{- if .HasDestroy }}
      > [!WARNING]
      > このplanにはリソースの削除が含まれます。内容を十分に確認してください。
      {{- end }}

      {{ .Result }}

      {{- if .ChangedResult }}

      <details><summary>詳細を展開</summary>

      {{ wrapCode .ChangedResult }}

      </details>
      {{- end }}

      {{- if .ChangeOutsideTerraform }}

      <details><summary>Terraform外で変更されたリソース</summary>

      {{ wrapCode .ChangeOutsideTerraform }}

      </details>
      {{- end }}

      {{- if .Warning }}

      ## Warnings

      {{ wrapCode .Warning }}
      {{- end }}

      {{- if .ErrorMessages }}

      ## Errors
      {{- range .ErrorMessages }}
      - {{ . }}
      {{- end }}
      {{- end }}

      {{- if .Link }}

      [詳細は Actions の Step Summary を参照]({{ .Link }})
      {{- end }}

    when_add_or_update_only:
      label: "terraform:changed"

    when_destroy:
      label: "terraform:destroy"
